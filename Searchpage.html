<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POTRETAKSI - Search</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Global Styles */
        :root {
            --nav-dark: #121212; /* Warna abu-abu gelap sesuai permintaan */
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding-bottom: 80px; /* Jarak agar konten tidak tertutup nav bawah */
        }

        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            outline: none;
            box-sizing: border-box;
        }

        /* Header */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            background-color: #000;
        }

        .logo {
            color: #E50914;
            font-weight: 900;
            font-size: 24px;
            font-style: italic;
            text-decoration: none;
            letter-spacing: -1px;
        }

        .nav-links {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .nav-links a {
            color: #ccc;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .search-icon-top {
            color: #E50914;
            font-size: 20px;
        }

        /* Search Bar Area */
        .search-container {
            padding: 10px 20px;
        }

        .search-box {
            background: #262626;
            border-radius: 8px;
            display: flex;
            align-items: center;
            padding: 12px 15px;
        }

        .search-box i {
            color: #888;
            margin-right: 10px;
        }

        .search-box input {
            background: transparent;
            border: none;
            color: #fff;
            outline: none;
            width: 100%;
            font-size: 16px;
        }

        /* Content List */
        .content-section {
            padding: 20px;
        }

        .section-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        #movieContainer {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .movie-item {
            display: flex;
            align-items: center;
            background: #121212;
            overflow: hidden;
            transition: background 0.3s;
        }

        .thumbnail-wrapper {
            width: 40%;
            aspect-ratio: 16 / 9;
            flex-shrink: 0;
        }

        .thumbnail-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .movie-info {
            flex-grow: 1;
            padding: 0 15px;
            font-weight: 600;
            font-size: 16px;
        }

        .play-btn {
            color: #fff;
            font-size: 32px;
            margin-right: 15px;
            text-decoration: none;
        }

        /* Navigasi Bawah (Style Sesuai Request) */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background-color: var(--nav-dark);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 1px solid #222;
            z-index: 2000;
        }

        .nav-link {
            text-decoration: none;
            color: #757575; /* Warna abu-abu untuk link tidak aktif */
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10px;
            gap: 4px;
        }

        .nav-link.active { 
            color: white; /* Hanya Search yang putih di halaman ini */
        }

        .nav-link i { 
            font-size: 20px; 
        }

        /* Not Found Message */
        #notFound {
            display: none;
            text-align: center;
            padding: 50px 20px;
            color: #555;
        }
    </style>
</head>
<body>

    <header>

                <a href="ningrumfilm.html" class="play-btn">

            <div class="movie-item">

                <div class="movie-info">Merasuk: First Possession</div>

            <div class="movie-item">
                <div class="thumbnail-wrapper">
                    <img src="pertanyaanthumbnail.jpg" alt="Pertanyaan Dalam Kubur">

        <div id="notFound">

        </div>
    </section>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-link">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="Searchpage.html" class="nav-link active">
            <i class="fas fa-search"></i>
            <span>Search</span>
        </a>
    </nav>

    <script>
        // Logika Pencarian Real-time
        const searchInput = document.getElementById('searchInput');
        const movieContainer = document.getElementById('movieContainer');
        const movieItems = movieContainer.getElementsByClassName('movie-item');
        const notFound = document.getElementById('notFound');

        searchInput.addEventListener('input', function() {
            const query = searchInput.value.toLowerCase();
            let hasResults = false;

            for (let i = 0; i < movieItems.length; i++) {
                const title = movieItems[i].querySelector('.movie-info').textContent.toLowerCase();
                
                if (title.includes(query)) {
                    movieItems[i].style.display = 'flex';
                    hasResults = true;
                } else {
                    movieItems[i].style.display = 'none';
                }
            }

            // Tampilkan pesan jika tidak ada film yang cocok
            notFound.style.display = hasResults ? 'none' : 'block';
        });
    </script>

</html>
