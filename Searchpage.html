<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pencarian Film</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            padding-bottom: 80px; /* Ruang agar tombol tidak menutupi konten */
        }

        /* Container Pencarian */
        .search-container {
            position: sticky;
            top: 0;
            background-color: #000;
            padding-bottom: 20px;
            z-index: 100;
        }

        .search-box {
            display: flex;
            align-items: center;
            background-color: #333;
            border-radius: 8px;
            padding: 10px 15px;
        }

        .search-box input {
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            width: 100%;
            outline: none;
            margin-left: 10px;
        }

        /* Grid Poster Film */
        .movie-section-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .movie-card {
            position: relative;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .movie-card:hover {
            transform: scale(1.05);
        }

        .movie-card img {
            width: 100%;
            border-radius: 4px;
            display: block;
            aspect-ratio: 2/3;
            object-fit: cover;
        }

        /* Tombol Kembali di Pojok Kiri Bawah */
        .back-button {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background-color: #000000; /* Merah khas Netflix */
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
            z-index: 1000;
            text-decoration: none;
            font-size: 14px;
        }

        .back-button:active {
            transform: scale(0.95);
        }

        .back-button svg {
            margin-right: 8px;
        }

        .hidden {
            display: none;
        }
        
      * {
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    outline: none;
}
    </style>
</head>
<body>

    <a href="javascript:history.back()" class="back-button">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Kembali
    </a>

    <div class="search-container">
        <div class="search-box">
            <svg width="20" height="20" fill="#8c8c8c" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <input type="text" id="searchInput" placeholder="Cari film..." onkeyup="liveSearch()">
        </div>
    </div>

    <div class="movie-section-title">Top Search</div>

    <div class="movie-grid" id="movieGrid">
        <div class="movie-card" data-title="Merasuk: first possession" onclick="location.href='merasukfilm.html'">
            <img src="merasukku.jpg" alt="Merasuk: first possession">
        </div>
        <div class="movie-card" data-title="Pertanyaan dalam kubur" onclick="location.href='pertanyaan.html'">
            <img src="pertanyaaku.jpg" alt="Pertanyaan dalam kubur">
        </div>
        <div class="movie-card" data-title="Gagabah: ucap laku lampah" onclick="location.href='gagabahfilm.html'">
            <img src="gagabahku.jpg" alt="Gagabah: ucap laku lampah">
        </div>
        <div class="movie-card" data-title="Kembalinya ningrum" onclick="location.href='ningrumfilm.html'">
            <img src="ningcomku.jpg" alt="Kembalinya ningrum">
        </div>
        <div class="movie-card" data-title="Searching: first case" onclick="location.href='teotfw.html'">
            <img src="Searchingku.jpg" alt="Searching: first case">
        </div>
        <div class="movie-card" data-title="Dia terpanggil" onclick="location.href='diaterpanggilfull.html'">
            <img src="diaku.jpg" alt="Dia terpanggil">
        </div>
        <div class="movie-card" data-title="Penunggu dari kematian" onclick="location.href='leuweungfilm.html'">
            <img src="penungguku.jpg" alt="Penunggu dari kematian">
        </div>
        <div class="movie-card" data-title="Siccin" onclick="location.href='siccinfilm.html'">
            <img src="siccinposter.jpg" alt="Siccin">
        </div>
        <div class="movie-card" data-title="School nightmare" onclick="location.href='schoolnightmarefull.html'">
            <img src="schoolnightmareps.jpg" alt="School nightmare">
        </div>
        <div class="movie-card" data-title="Virus x" onclick="location.href='virusxfull.html'">
            <img src="virusxposter.jpg" alt="Virus x">
        </div>
    </div>

    <script>
        function liveSearch() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.getElementsByClassName('movie-card');

            for (let i = 0; i < cards.length; i++) {
                let title = cards[i].getAttribute('data-title').toLowerCase();
                if (title.includes(input)) {
                    cards[i].classList.remove("hidden");
                } else {
                    cards[i].classList.add("hidden");
                }
            }
        }
    </script>
</body>
</html>
