<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potretaksi - Echoes of Silence</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #ffffff;
            font-family: 'Roboto', sans-serif;
            line-height: 1.5;
        }

        /* Container Video */
        .video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* Aspect Ratio 16:9 */
            background-color: #111;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Tombol Back */
        .back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            text-decoration: none;
            color: white;
        }

        /* Konten Detail */
        .content-details {
            padding: 20px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .meta-data {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .match-score {
            color: #46d369;
            font-weight: bold;
        }

        .rating-box {
            border: 1px solid #888;
            padding: 2px 6px;
            border-radius: 3px;
            color: #ccc;
        }

        .duration {
            color: #aaa;
        }

        /* Baris Tombol Aksi */
        .action-bar {
            display: flex;
            gap: 40px;
            margin-bottom: 30px;
        }

        .action-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: #fff;
            transition: opacity 0.2s;
        }

        .action-item:active {
            opacity: 0.6;
        }

        .action-item i {
            font-size: 24px;
        }

        .action-item span {
            font-size: 12px;
            color: #aaa;
        }

        /* Garis Pemisah */
        hr {
            border: 0;
            border-top: 1px solid #333;
            margin-bottom: 25px;
        }

        /* Sinopsis & Genre */
        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .synopsis-text {
            color: #ccc;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .genre-tags {
            display: flex;
            gap: 10px;
        }

        .tag {
            background-color: #333;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 14px;
            color: #eee;
        }
        
                        * {
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    outline: none;
}

body {
    background-color: #000;
    color: #ffffff;
    font-family: 'Roboto', sans-serif;
    line-height: 1.5;
    /* Tambahkan ini */
    padding-bottom: 50px; 
}
    </style>
</head>
<body>

    <div class="video-container">
<a href="index.html" class="back-button">
    <i class="fas fa-arrow-left"></i>
</a>
        
        <iframe 
            src="https://youtube.com/embed/OxNsVnFRGaE?si=KbsO3KUqG2rtAiKQ" 
            allowfullscreen>
        </iframe>
    </div>

    <div class="content-details">
        <h1>Virus x</h1>

        <div class="meta-data">
            <span class="match-score">50% Match</span>
            <span class="year">2025</span>
            <span class="rating-box">13+</span>
            <span class="duration">25 Minutes</span>
        </div>

        <div class="action-bar">
            <a href="https://www.instagram.com/potretaksi.id?igsh=NXNrNG42MHphcnJm" class="action-item">
                <i class="fas fa-plus"></i>
                <span>My List</span>
            </a>
            <a href="https://www.instagram.com/potretaksi.id?igsh=NXNrNG42MHphcnJm" class="action-item">
                <i class="fas fa-share-nodes"></i>
                <span>Share</span>
            </a>
            <a href="https://www.instagram.com/potretaksi.id?igsh=NXNrNG42MHphcnJm" class="action-item">
                <i class="fas fa-circle-info"></i>
                <span>Info</span>
            </a>
        </div>

        <hr>

        <h3 class="section-title">Synopsis</h3>
        <p class="synopsis-text">
            Saat manusia lupa menjaga diri dan sesama, bencana datang tanpa peringatan.
            
            Apakah ini ujian... atau akhir dari segalanya?
        </p>

        <h3 class="section-title">Genres</h3>
        <div class="genre-tags">
            <span class="tag">Horor</span>
            <span class="tag">Thiller</span>
        </div>
    </div>

</body>
</html>
